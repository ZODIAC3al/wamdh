version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: wamdh-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: wamdh_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wamdh-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - MONGO_URI=mongodb://mongo:27017/wamdh_db
      - SECRET_KEY=django-insecure-wamdh-prod-secret-key-change-in-prod
      - ALLOWED_HOSTS=*
      - CORS_ALLOW_ALL_ORIGINS=True
    depends_on:
      - mongo

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: wamdh-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
